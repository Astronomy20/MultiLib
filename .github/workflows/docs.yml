name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - 'README.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Generate homepage from README
        run: |
          sed \
            -e 's#\](\.\./\.\./wiki/api-reference/Multiblock-States-And-Progress)#](api-reference/Multiblock-States-And-Progress.md)#' \
            -e 's#\](\.\./\.\./wiki/Advanced-Features#\](Advanced-Features.md#' \
            -e 's|](/wiki/index#7-api-reference)|](api-reference/MultiLibAPI.md)|' \
            -e 's#\](wiki/index\.md)#](index.md)#' \
            -e 's#\](wiki/Getting-Started)#](Getting-Started.md)#' \
            -e 's#\](wiki/Core-Concepts)#](Core-Concepts.md)#' \
            -e 's#\](wiki/Pattern-Design-Guide)#](Pattern-Design-Guide.md)#' \
            -e 's#\](wiki/Rotation-And-Matching)#](Rotation-And-Matching.md)#' \
            -e 's#\](wiki/Advanced-Features)#](Advanced-Features.md)#' \
            -e 's#\](wiki/FAQ-Troubleshooting)#](FAQ-Troubleshooting.md)#' \
            README.md > wiki/index.md

      - name: Build site
        run: mkdocs build -f wiki/mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
