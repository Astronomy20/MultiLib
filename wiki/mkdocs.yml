site_name: MultiLib
site_url: https://astronomy20.github.io/MultiLib/
repo_url: https://github.com/Astronomy20/MultiLib
docs_dir: .
site_dir: ../site

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - content.code.copy

extra:
